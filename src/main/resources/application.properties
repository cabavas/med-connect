spring.application.name=medconnect
# Database Connectivity
spring.datasource.url=jdbc:mysql://localhost:3306/medconnect_db?createDatabaseIfNotExist=true
spring.datasource.username=meduser
spring.datasource.password=medpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Strategy
# 'validate' apenas confere se as classes batem com o banco, sem alterá-lo.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
# Garante que o Flyway crie a tabela de histórico se ela não existir
spring.flyway.baseline-on-migrate=true

# Swagger Configuration
# Customiza o caminho para acessar o JSON do OpenAPI
springdoc.api-docs.path=/api-docs
# Customiza o caminho para acessar a interface visual do Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# RabbitMQ Configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest